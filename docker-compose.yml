services:
  mongodb:
    image: mongo:latest
    container_name: vote-system-mongodb
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-choose}
    networks:
      - vote-network

  mongo-express:
    image: mongo-express:latest
    container_name: vote-system-mongo-express
    restart: always
    ports:
      - "${MONGO_EXPRESS_PORT:-8081}:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USER:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD:-pass}
    depends_on:
      - mongodb
    networks:
      - vote-network

networks:
  vote-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
